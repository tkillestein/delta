site_name: delta
site_description: High-performance astronomical difference imaging (modern Alard & Lupton)
site_author: Tom Killestein
repo_url: https://github.com/tkillestein/delta
repo_name: tkillestein/delta
copyright: Copyright &copy; Tom Killestein — MIT licensed

theme:
  name: material
  icon:
    logo: material/star-four-points-outline
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# SPEC.md is surfaced via a snippet include in spec.md, not as its own nav page.
not_in_nav: |
  /SPEC.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [python]
          options:
            docstring_style: null
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: [".", "docs"]
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Usage: usage.md
  - Command line: cli.md
  - API reference:
      - Overview: api/index.md
      - Pipeline: api/pipeline.md
      - Kernel solution: api/solution.md
      - Inputs: api/inputs.md
      - Validation: api/validation.md
      - Core (low-level): api/core.md
  - Design (SPEC): design.md
  - Performance: performance.md
