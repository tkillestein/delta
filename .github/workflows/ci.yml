name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs of this workflow on the same ref. Keep this at the
# workflow level (not per-job): a job-level group keyed on matrix.os makes the
# matrix legs share one group and cancel each other.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # System deps for the C++ core: Eigen and CFITSIO are resolved via
      # pkg-config (see CMakeLists.txt); the FFT is vendored (extern/pocketfft).
      # OpenMP is optional.
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libeigen3-dev libcfitsio-dev

      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pkg-config eigen cfitsio libomp

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      # Builds the C++ `_core` extension and installs dev deps.
      - name: Build + install
        run: uv sync -p ${{ matrix.python-version }}

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Format check (ruff)
        run: uv run ruff format --check

      - name: Type check (ty)
        run: uv run ty check

      # No test currently carries the `slow` marker (registered in
      # pyproject.toml) — the large-frame integration test defaults to a
      # 1536px frame (~20s) and runs here too; `-m "not slow"` is a no-op
      # today, kept as the hook for a future test that dials `SIZE` up to
      # the full SPEC §13.3 8192px frame.
      - name: Test (pytest)
        run: uv run pytest -m "not slow"
